name: AgentMind CI/CD

on:
  push:
    branches: [main]

env:
  ECR_REGISTRY:   532918215819.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY: agentmind
  ECS_CLUSTER:    agentmind-cluster
  ECS_SERVICE:    agentmind-service

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Test
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (CPU torch)
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.11.0+cpu
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run smoke tests
        run: python -m pytest tests/ -v

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build & Push to ECR (merged to avoid 2 GB tarball round-trip)
# ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # ECR login BEFORE build so --cache-from can pull the last image
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Buildx gives us layer caching and explicit --platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      # Pull previous :latest for layer cache — tolerate failure on first run
      - name: Pull previous image for cache (best-effort)
        run: |
          docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest || true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5.4.0
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          # Reuse layers from the previously pushed :latest image
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-to: type=inline

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Deploy to ECS Fargate
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-central-1

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster agentmind-cluster \
            --service agentmind-service \
            --force-new-deployment \
            --region eu-central-1 || \
          aws ecs update-service \
            --cluster agentmind-cluster \
            --service agentmind-service \
            --force-new-deployment \
            --region eu-central-1

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster agentmind-cluster \
            --services agentmind-service \
            --region eu-central-1

      - name: Deployment complete
        run: |
          echo "Deployed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "Live at:  http://35.157.189.76:8000/health"
